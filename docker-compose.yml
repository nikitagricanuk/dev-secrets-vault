services:
  vault:
    build: 
      dockerfile: Dockerfile.vault
      context: backend/
    ports:
      - 8000:8000
    restart: always

  postgres:
    build: 
      dockerfile: Dockerfile.postgres
      context: backend/
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
    restart: always

  redis:
    image: mirror.gcr.io/redis:7.4
    restart: always
    volumes:
      - redisdata:/data



volumes:
  pgdata:
  redisdata: